name: Build MarkForge

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------- DEPENDENCIES ----------------
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ cmake libsqlite3-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install sqlite cmake

      - name: Install dependencies (Windows - vcpkg)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg.exe install sqlite3:x64-windows

      # ---------------- CONFIGURE ----------------
      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cmake -S . -B build

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build `
            -DCMAKE_TOOLCHAIN_FILE="$PWD/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      # ---------------- BUILD ----------------
      - name: Build project
        run: cmake --build build --config Release

      # ---------------- PACKAGE ----------------
      - name: Package artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist

          exe=$(find build -type f -maxdepth 3 -perm -111 | head -n 1)

          if [ -z "$exe" ]; then
            echo "No executable found in build directory"
            exit 1
          fi

          echo "Found binary: $exe"

          out="dist/markforge-${{ runner.os }}-${{ runner.arch }}"

          cp "$exe" "$out"
          chmod +x "$out"

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir dist
          $exe = Get-ChildItem -Path build -Recurse -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No executable found"
            exit 1
          }
          Copy-Item $exe.FullName dist\markforge-windows-x64.exe

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: markforge-${{ matrix.os }}
          path: dist/


  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          generate_release_notes: true
          files: dist/**/*
          draft: false
          prerelease: false