name: Build MarkForge

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------- LINUX / MAC ----------------
      - name: Install dependencies (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y g++ sqlite3 libsqlite3-dev
          fi

          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install sqlite
          fi

      # ---------------- WINDOWS ----------------
      - name: Setup MSVC / Mingw
        if: matrix.os == 'windows-latest'
        run: |
          choco install mingw -y

      # ---------------- BUILD ----------------
      - name: Build project (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p build

          g++ -std=c++17 \
            src/**/*.cpp \
            -o build/markforge \
            -lsqlite3

      - name: Build project (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir build

          g++ -std=c++17 `
            (Get-ChildItem -Recurse -Filter *.cpp | ForEach-Object FullName) `
            -o build/markforge.exe

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: markforge-${{ matrix.os }}
          path: build/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/*