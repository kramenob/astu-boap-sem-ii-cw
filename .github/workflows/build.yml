name: Build MarkForge

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------- DEPENDENCIES ----------------
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ cmake libsqlite3-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install sqlite cmake

      - name: Install dependencies (Windows - vcpkg)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg.exe install sqlite3:x64-windows-static

      # ---------------- CONFIGURE ----------------
      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cmake -S . -B build

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build `
            -DCMAKE_TOOLCHAIN_FILE="$PWD/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static

      # ---------------- BUILD ----------------
      - name: Build project
        run: cmake --build build --config Release

      # ---------------- PACKAGE ----------------
      - name: Package artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp build/markforge dist/markforge-${{ runner.os }}-${{ runner.arch }} || true
          chmod +x dist/* || true

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir dist

          $exe = Get-ChildItem -Path build -Recurse -Filter "*.exe" |
            Where-Object { $_.Name -like "markforge*.exe" } |
            Select-Object -First 1

          if (-not $exe) {
            $exe = Get-ChildItem -Path build -Recurse -Filter "*.exe" | Select-Object -First 1
          }

          if (-not $exe) {
            Write-Error "No executable found in build directory"
            exit 1
          }

          Copy-Item $exe.FullName dist\markforge-Windows-x64.exe

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: markforge-${{ matrix.os }}
          path: dist/


  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version info
        id: ver
        shell: bash
        run: |
          CURR=$(grep -oE '#define[[:space:]]+APP_VERSION[[:space:]]+"?[0-9A-Za-z.]+"?' src/core/About.h | grep -oE '[0-9A-Za-z.]+')
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "v0.0.0")

          echo "curr=$CURR" >> $GITHUB_OUTPUT
          echo "prev=$PREV" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Show downloaded files
        run: ls -R dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: MarkForge ${{ steps.ver.outputs.curr }}
          generate_release_notes: false
          body: |
            Full Changelog: ${{ steps.ver.outputs.prev }}...v${{ steps.ver.outputs.curr }}
          files: dist/**/*
          draft: false
          prerelease: false